# CogView4 Benchmark
# Adjust model_name to match your installed model.
# Use `invokeai-bench list-models --base cogview4` to see available models.

[connection]
host = "http://127.0.0.1:9090"

[defaults]
warmup_runs = 1
iterations = 3
seed = 42
positive_prompt = "a photo of a mountain landscape at golden hour, highly detailed"
negative_prompt = "blurry, bad quality, worst quality"

[[scenario]]
name = "cogview4_1024_txt2img"
type = "txt2img"
base = "cogview4"
model_name = "CogView4-6B"
width = 1024
height = 1024
steps = 25
cfg_scale = 3.5
