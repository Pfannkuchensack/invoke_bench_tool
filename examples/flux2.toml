# FLUX.2 Klein Benchmark
# Adjust model_name to match your installed model.
# Use `invokeai-bench list-models --base flux2` to see available models.
# Note: FLUX.2 models require Qwen3 encoder submodels to be installed.

[connection]
host = "http://127.0.0.1:9090"

[defaults]
warmup_runs = 1
iterations = 3
seed = 42
positive_prompt = "a photo of a mountain landscape at golden hour, highly detailed"
negative_prompt = ""

[[scenario]]
name = "flux2_klein_1024_txt2img"
type = "txt2img"
base = "flux2"
model_name = "FLUX.2 Klein 4B (FP8)"
width = 1024
height = 1024
steps = 4
cfg_scale = 1.0
